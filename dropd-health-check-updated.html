// Only update the submitForm function:
async function submitForm() {
  if (!validate(4)) return;
  const btn=document.getElementById('sub-btn');
  const lbl=document.getElementById('sub-lbl');
  const sp=document.getElementById('spinner');
  const arr=document.getElementById('sub-arr');
  btn.disabled=true; lbl.textContent='Sending...'; sp.style.display='inline-block'; arr.style.display='none';

  const data = collectData();

  try {
    const res = await fetch(WEBHOOK,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
    const result = await res.json();
    if (!result.ok) throw new Error(result.error || 'Unknown error');
    toast('✓ Submitted successfully','ok');
  } catch(e) {
    console.error(e);
    toast('⚠ Submission failed — please try again','err');
  }
  showSuccess(data);
}
